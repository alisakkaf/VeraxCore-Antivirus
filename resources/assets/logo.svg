<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!--
  VeraxCore Antivirus — primary brand mark, 512×512 native, infinitely
  scalable. The mark composes a heater shield (protection metaphor), a
  stylised flame (Fire Dragon brand identity carried over from the
  predecessor app), an "AS" monogram for Ali Sakkaf, and a single rotating
  orbit ring suggesting active scanning.
  By Ali Sakkaf — https://alisakkaf.com
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"
     width="512" height="512" role="img"
     aria-label="VeraxCore Antivirus logo">
  <defs>
    <!-- Outer shield gradient — deep navy → midnight charcoal -->
    <linearGradient id="vxShieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1E2540"/>
      <stop offset="55%"  stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <!-- Flame gradient — ember orange → crimson → gold -->
    <linearGradient id="vxFlameGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#FFD37A"/>
      <stop offset="35%"  stop-color="#FF8A2E"/>
      <stop offset="70%"  stop-color="#E11D48"/>
      <stop offset="100%" stop-color="#7C0D2A"/>
    </linearGradient>
    <!-- Inner glow disc -->
    <radialGradient id="vxCoreGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"   stop-color="#FFE3B0" stop-opacity="0.95"/>
      <stop offset="60%"  stop-color="#FF7A1A" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0"/>
    </radialGradient>
    <!-- Orbit ring stroke gradient -->
    <linearGradient id="vxOrbit" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#FFB347"/>
      <stop offset="50%"  stop-color="#FFD37A"/>
      <stop offset="100%" stop-color="#E11D48"/>
    </linearGradient>
    <!-- Soft drop shadow used by the shield -->
    <filter id="vxShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="6" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── Shield silhouette ───────────────────────────────────────────── -->
  <g filter="url(#vxShadow)">
    <path d="M256 28
             L444 96
             L444 232
             C444 348 372 432 256 484
             C140 432 68 348 68 232
             L68 96 Z"
          fill="url(#vxShieldGrad)"
          stroke="#FFB347" stroke-width="6" stroke-linejoin="round"/>
  </g>

  <!-- Subtle inner stroke for depth -->
  <path d="M256 50
           L424 110
           L424 232
           C424 336 360 414 256 460
           C152 414 88 336 88 232
           L88 110 Z"
        fill="none" stroke="#FFB347" stroke-opacity="0.18" stroke-width="2"/>

  <!-- ── Core glow disc behind the flame ─────────────────────────────── -->
  <circle cx="256" cy="262" r="150" fill="url(#vxCoreGlow)"/>

  <!-- ── Rotating orbit ring (animation kicks in when SVG renderer
        supports SMIL — Qt's QSvgRenderer renders the static frame, the
        UI-side SpinnerRing handles motion separately) ────────────────── -->
  <g>
    <ellipse cx="256" cy="262" rx="170" ry="170"
             fill="none"
             stroke="url(#vxOrbit)" stroke-width="3"
             stroke-dasharray="8 14" opacity="0.55">
      <animateTransform attributeName="transform"
                        type="rotate" from="0 256 262" to="360 256 262"
                        dur="14s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="256" cy="262" rx="200" ry="200"
             fill="none"
             stroke="url(#vxOrbit)" stroke-width="2"
             stroke-dasharray="2 10" opacity="0.30">
      <animateTransform attributeName="transform"
                        type="rotate" from="360 256 262" to="0 256 262"
                        dur="22s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- ── Flame body ──────────────────────────────────────────────────── -->
  <g>
    <path d="M256 110
             C300 156 332 196 332 248
             C332 286 308 318 286 332
             C302 322 314 304 314 282
             C314 256 296 232 274 218
             C284 240 286 264 274 286
             C264 304 246 312 230 312
             C212 312 198 296 198 274
             C198 244 222 224 240 198
             C228 208 218 222 214 240
             C204 224 202 200 214 178
             C226 156 244 136 256 110 Z"
          fill="url(#vxFlameGrad)"
          stroke="#FFD37A" stroke-width="2" stroke-linejoin="round">
      <animate attributeName="opacity" values="1;0.92;1"
               dur="3s" repeatCount="indefinite"/>
    </path>
    <!-- Flame inner highlight -->
    <path d="M256 154
             C278 184 296 212 296 248
             C296 274 282 296 264 304
             C272 296 278 286 278 270
             C278 252 266 232 254 222
             C260 240 260 256 252 270
             C246 282 234 286 224 282
             C214 278 208 266 210 250
             C212 232 224 218 236 200
             C232 218 234 232 244 240
             C240 222 244 200 256 154 Z"
          fill="#FFE3B0" opacity="0.55"/>
  </g>

  <!-- ── AS monogram inside the shield, lower section ────────────────── -->
  <g transform="translate(256 412)">
    <!-- Soft pill behind the monogram -->
    <rect x="-78" y="-30" width="156" height="60" rx="22" ry="22"
          fill="#0B1220" fill-opacity="0.55"
          stroke="#FFB347" stroke-opacity="0.6" stroke-width="2"/>
    <!-- A -->
    <text x="-30" y="14" text-anchor="middle"
          font-family="Inter, 'Segoe UI', sans-serif"
          font-size="44" font-weight="900" letter-spacing="2"
          fill="#FFD37A">A</text>
    <!-- Divider dot -->
    <circle cx="0" cy="-2" r="3" fill="#E11D48"/>
    <!-- S -->
    <text x="30" y="14" text-anchor="middle"
          font-family="Inter, 'Segoe UI', sans-serif"
          font-size="44" font-weight="900" letter-spacing="2"
          fill="#FFD37A">S</text>
  </g>
</svg>
